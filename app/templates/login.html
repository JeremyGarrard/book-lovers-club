{% extends "base.html" %}
{% block title %}Log In — Book Lovers Club{% endblock %}

{% block content %}
<section class="section">
  <div class="container auth-container">
    <div class="auth-card card">
      <div class="auth-deco">📚 ✨ 🌸</div>
      <h1 class="auth-title">Welcome Back!</h1>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" class="input-field" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="input-field" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Log In 📖</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <a href="/auth/google" class="btn btn-google btn-full">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right:8px;vertical-align:middle">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </a>

      <p class="auth-switch">Don't have an account? <a href="/register">Join us! 🌸</a></p>
    </div>
  </div>
</section>
{% endblock %}
